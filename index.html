<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QudahWay</title>
    <!-- Favicon / Shortcut Icon -->
    <link rel="icon" type="image/png" href="QudahWay.png">
    <link rel="apple-touch-icon" href="QudahWay.png">

    <!-- Meta tags for social media/shortcut preview -->
    <meta property="og:title" content="QudahWay">
    <meta property="og:image" content="QudahWay.png">
    <meta name="twitter:image" content="QudahWay.png">

    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;800&family=Satisfy&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --accent: #facc15;
            --success: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .mantra-wrapper {
            margin: 40px 0 80px 0;
            position: relative;
            padding: 20px 0;
        }

        .mantra-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 140px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, transparent 75%);
            filter: blur(20px);
            z-index: 0;
        }

        .mantra-clip {
            position: relative;
            display: inline-block;
            overflow: visible;
            /* سمحنا للقطة تطلع فوق وتحت */
        }

        .mantra-inner {
            position: relative;
            z-index: 10;
            /* فوق القطة */
            display: inline-block;
            background: var(--bg-dark);
            /* عشان القطة تختفي وراه */
            padding: 15px 45px;
            border-top: 1px solid rgba(56, 189, 248, 0.15);
            border-bottom: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 10px 40px -15px rgba(0, 0, 0, 0.7);
        }

        .q-mark {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: var(--accent);
            opacity: 0.3;
            position: absolute;
            line-height: 1;
            pointer-events: none;
        }

        .q-right {
            top: -20px;
            right: -25px;
        }

        .q-left {
            bottom: -40px;
            left: -25px;
        }

        .mantra-text {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--text-light);
            margin: 0;
            font-weight: 700;
            text-align: center;
        }

        @keyframes desertFlow {
            0% {
                background-position: -150% 0%;
            }

            100% {
                background-position: 150% 0%;
            }
        }

        .animated-mantra {
            background: linear-gradient(-90deg,
                    var(--text-light) 0%,
                    var(--text-light) 40%,
                    #d97706 50%,
                    var(--text-light) 60%,
                    var(--text-light) 100%);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            animation: desertFlow 15s linear infinite;
        }

        /* الكروت */
        .section-title {
            text-align: right;
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 1.5rem;
            width: 100%;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .link-card {
            background: var(--card-dark);
            padding: 30px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(51, 65, 85, 0.5);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .link-card:hover {
            transform: translateY(-5px);
            border-color: var(--card-accent-color, var(--primary));
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .card-content {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .card-title {
            display: block;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-family: 'Inter', sans-serif;
            color: var(--primary);
        }

        .card-desc {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .soon-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #a855f7, #c084fc);
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(168, 85, 247, 0.4);
            transform: rotate(-10deg);
            z-index: 20;
            font-family: 'Inter', sans-serif;
            animation: pulse-badge 2s infinite;
        }

        @keyframes pulse-badge {
            0% {
                transform: scale(1) rotate(-10deg);
                box-shadow: 0 4px 10px rgba(168, 85, 247, 0.4);
            }

            50% {
                transform: scale(1.05) rotate(-10deg);
                box-shadow: 0 4px 15px rgba(168, 85, 247, 0.6);
            }

            100% {
                transform: scale(1) rotate(-10deg);
                box-shadow: 0 4px 10px rgba(168, 85, 247, 0.4);
            }
        }

        @media(max-width:600px) {
            h1 {
                font-size: 2.5rem;
            }

            .mantra-text {
                font-size: 1.3rem;
            }
        }
    </style>
    <link rel="stylesheet" href="./gooey.css">
</head>

<body>
    <div class="container">
        <h1>
            <span style="color:var(--primary)">Qudah</span><span style="color:var(--accent)">Way</span>
        </h1>

        <div class="mantra-wrapper">
            <div class="mantra-glow"></div>

            <div class="mantra-clip" id="mantra-clip">


                <div class="mantra-inner">
                    <span class="q-mark q-right">”</span>
                    <p class="mantra-text">
                        <span class="animated-mantra">خَيْرُ العِلْمِ مَا نَفَعَ، وَأَصْدَقُهُ مَا بُسِّطَ
                            وَوَصَلَ.</span>
                    </p>
                    <span class="q-mark q-left">“</span>
                </div>
            </div>
        </div>

        <h2 class="section-title">:المساقات</h2>
        <div class="links-grid">
            <a href="ir/index.html" class="link-card" style="--card-accent-color: var(--primary)">
                <div class="card-content">
                    <span class="card-title">Information Retrieval (IR)</span>
                    <p class="card-desc">استرجاع المعلومات </p>
                </div>
            </a>
            <a href="cv/index.html" class="link-card" style="--card-accent-color: var(--success)">
                <div class="card-content">
                    <span class="card-title">Computer Vision (CV)</span>
                    <p class="card-desc"> الرؤية الحاسوبية</p>
                </div>
            </a>
            <a href="DS/index.html" class="link-card" style="--card-accent-color: var(--accent)">
                <div class="card-content">
                    <span class="card-title">Data Science (DS)</span>
                    <p class="card-desc">تحليل البيانات </p>
                </div>
            </a>
            <a href="ss/index.html" class="link-card" style="--card-accent-color: #a855f7">
                <span class="soon-badge">!Soon</span>
                <div class="card-content">
                    <span class="card-title">Smart Systems (SS)</span>
                    <p class="card-desc">الأنظمة الذكية</p>
                </div>
            </a>
        </div>
    </div>

    <!-- Navigation JS (Gooey effect) -->
    <script src="./gooey.js"></script>
    <link rel="stylesheet" href="/qudahbot.css">
    <script src="/qudahbot.js"></script>
</body>

</html>
