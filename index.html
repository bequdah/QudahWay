<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QudahWay</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;800&family=Satisfy&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --accent: #facc15;
            --success: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Cairo', sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .mantra-wrapper {
            margin: 40px 0 80px 0;
            position: relative;
            padding: 20px 0;
        }

        .mantra-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 140px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, transparent 75%);
            filter: blur(20px);
            z-index: 0;
        }

        .mantra-clip {
            position: relative;
            display: inline-block;
            overflow: visible;
            /* سمحنا للقطة تطلع فوق وتحت */
        }

        .mantra-inner {
            position: relative;
            z-index: 10;
            /* فوق القطة */
            display: inline-block;
            background: var(--bg-dark);
            /* عشان القطة تختفي وراه */
            padding: 15px 45px;
            border-top: 1px solid rgba(56, 189, 248, 0.15);
            border-bottom: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 10px 40px -15px rgba(0, 0, 0, 0.7);
        }

        .q-mark {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            color: var(--accent);
            opacity: 0.3;
            position: absolute;
            line-height: 1;
            pointer-events: none;
        }

        .q-right {
            top: -20px;
            right: -25px;
        }

        .q-left {
            bottom: -40px;
            left: -25px;
        }

        .mantra-text {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: var(--text-light);
            margin: 0;
            font-weight: 700;
            text-align: center;
        }

        @keyframes desertFlow {
            0% {
                background-position: -150% 0%;
            }

            100% {
                background-position: 150% 0%;
            }
        }

        .animated-mantra {
            background: linear-gradient(-90deg,
                    var(--text-light) 0%,
                    var(--text-light) 40%,
                    #d97706 50%,
                    var(--text-light) 60%,
                    var(--text-light) 100%);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            animation: desertFlow 15s linear infinite;
        }

        /* القطة */
        .cat-gate {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 350px;
            /* مساحة واسعة للتحرك براحتها */
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
            /* تحت النص */
        }

        #cat-peep {
            position: absolute;
            top: 35px;
            /* رفعناه شوي لفوق عشان نضمن اختفاءه */
            left: 50%;
            width: 110px;
            height: 110px;
            /* rotate(180deg) لقلبها، و translateY(80px) لإخفائها بعمق ورا النص */
            transform: translate(-50%, -50%) rotate(180deg) translateY(80px);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #cat-peep.peeping {
            /* تنزل لتحت أكتر عشان يبين الوجه كامل */
            transform: translate(-50%, -50%) rotate(180deg) translateY(-100px);
        }

        #lottie-cat {
            width: 100%;
            height: 100%;
        }

        /* الكروت */
        .section-title {
            text-align: right;
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .link-card {
            background: var(--card-dark);
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #334155;
            transition: transform 0.2s, border-color 0.2s;
        }

        .link-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        @media(max-width:600px) {
            h1 {
                font-size: 2.5rem;
            }

            .mantra-text {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>
            <span style="color:var(--primary)">Qudah</span><span style="color:var(--accent)">Way</span>
            <span style="color:var(--text-muted);font-family:'Cairo';font-size:1.5rem;font-weight:400"> Method</span>
        </h1>

        <div class="mantra-wrapper">
            <div class="mantra-glow"></div>

            <div class="mantra-clip" id="mantra-clip">
                <!-- القطة داخل حاوية بتقص أي إشي بيطلع لفوق -->
                <div class="cat-gate">
                    <div id="cat-peep">
                        <div id="lottie-cat"></div>
                    </div>
                </div>

                <div class="mantra-inner">
                    <span class="q-mark q-right">”</span>
                    <p class="mantra-text">
                        <span class="animated-mantra">خَيْرُ العِلْمِ مَا نَفَعَ، وَأَصْدَقُهُ مَا بُسِّطَ
                            وَوَصَلَ.</span>
                    </p>
                    <span class="q-mark q-left">“</span>
                </div>
            </div>
        </div>

        <h2 class="section-title">المساقات:</h2>
        <div class="links-grid">
            <a href="ir/index.html" class="link-card" style="border-left:4px solid var(--primary)">
                <div style="text-align:right">
                    <span class="card-title">Information Retrieval (IR)</span>
                    <p style="margin:5px 0 0;font-size:.85rem;color:var(--text-muted)">استرجاع المعلومات والبحث الذكي
                    </p>
                </div><span class="card-icon">🔍</span>
            </a>
            <a href="cv/index.html" class="link-card"
                style="border-left:4px solid var(--success);background:rgba(52,211,153,0.05)">
                <div style="text-align:right">
                    <span class="card-title">Computer Vision (CV)</span>
                    <p style="margin:5px 0 0;font-size:.85rem;color:var(--text-muted)">تحليل الصور والرؤية الحاسوبية</p>
                </div><span class="card-icon">👁️</span>
            </a>
            <a href="DS/index.html" class="link-card"
                style="border-left:4px solid var(--accent);background:rgba(250,204,21,0.05)">
                <div style="text-align:right">
                    <span class="card-title">Data Science (DS)</span>
                    <p style="margin:5px 0 0;font-size:.85rem;color:var(--text-muted)">تحليل البيانات والذكاء الاصطناعي
                    </p>
                </div><span class="card-icon">📊</span>
            </a>
        </div>
    </div>

        function runCatCycle() {
            // 1. تطلع القطة
            catEl.classList.add('peeping');

            // 2. نستنى شوي لتخلص حركة الـ CSS وبعدين نشغل الانيميشن (الـ 77 فريم)
            setTimeout(() => {
                anim.goToAndPlay(0);
            }, 400);
        }

        // لما يخلصوا الـ 77 فريم بالزبط
        anim.addEventListener('complete', () => {
            // 3. نرجع نخفي القطة
            catEl.classList.remove('peeping');

            // 4. نستنى وقت (مثلاً 4 ثواني) ونعيد الدورة
            setTimeout(runCatCycle, 4000);
        });

        setTimeout(runCatCycle, 2000);
