<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QudahWay | Smart Systems</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;800&family=Satisfy&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="../QudahWay.png">

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --accent: #facc15;
            --danger: #fb7185;
            --success: #34d399;
            --purple: #a855f7;
            --border: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Satisfy', cursive;
            font-size: 3rem;
            color: var(--primary);
            margin: 0;
        }

        .coming-soon-box {
            background: var(--card-dark);
            padding: 60px 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(168, 85, 247, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-top: 50px;
            position: relative;
            overflow: hidden;
        }

        .coming-soon-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--purple), transparent);
        }

        .coming-soon-text {
            font-size: 2rem;
            color: var(--text-light);
            font-weight: 700;
            margin-bottom: 15px;
        }

        .coming-soon-sub {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .icon-box {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--purple);
            opacity: 0.8;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 20px 10px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .header p {
                font-size: 1.1rem !important;
            }

            .coming-soon-text {
                font-size: 1.5rem;
            }
        }
    </style>
    <link rel="stylesheet" href="../gooey.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
                <a href="../index.html"
                    style="text-decoration: none; color: var(--accent); font-weight: 700; display: flex; align-items: center; gap: 8px; background: rgba(250, 204, 21, 0.08); padding: 8px 20px; border-radius: 15px; border: 1px solid rgba(250, 204, 21, 0.2); transition: all 0.3s;"
                    onmouseover="this.style.background='rgba(250, 204, 21, 0.15)'; this.style.transform='translateY(-2px)'"
                    onmouseout="this.style.background='rgba(250, 204, 21, 0.08)'; this.style.transform='translateY(0)'">
                    العودة للرئيسية
                </a>
            </div>
            <h1><span style="color: var(--primary);">Qudah</span><span style="color: var(--accent);">Way</span></h1>
            <p
                style="font-family: 'Cairo', sans-serif; font-size: 1.35rem; color: var(--text-light); margin: 15px 0; font-weight: 600;">
                Smart Systems <span style="font-size: 1.1rem; opacity: 0.7; margin: 0 5px; font-weight: 400;">By</span>
                <span
                    style="color: var(--primary); font-family: 'Satisfy', cursive; font-size: 1.6rem; font-weight: normal;">Mohammad</span>
                <span
                    style="color: var(--accent); font-family: 'Satisfy', cursive; font-size: 1.6rem; font-weight: normal;">Qudah</span>
            </p>
        </div>

        <div class="coming-soon-box">
            <div class="icon-box">⏳</div>
            <div class="coming-soon-text">لما تتوفر السلايدات قريباً!</div>
        </div>

    </div>

    <!-- Navigation JS (Gooey effect) -->
    <script src="../gooey.js"></script>
</body>

</html>
